services:
  # ==========================================
  # Admin Dashboard
  # ==========================================
  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
      args:
        # Defaults to localhost for local testing
        # Override in Dokploy to: https://api.ohmkenya.com
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: ohmkenya-admin-dashboard
    restart: unless-stopped
    ports:
      - "80:3000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # API (OHMKenya Backend)
  # ==========================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ohmkenya-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Application Logic
      # NOTE: Set to 'production' in Dokploy for production deployment
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000

      # Internal Network Connection
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ohmkenya
      REDIS_URL: redis://redis:6379

      # External Logic (Fill these in your .env or Dokploy)
      MPESA_SHORTCODE: ${MPESA_SHORTCODE}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}

      # Allow CORS from localhost and prod
      CORS_ORIGINS: "http://localhost:3000,https://ohmkenya.com"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # Database (PostgreSQL 17)
  # ==========================================
  postgres:
    image: postgres:17-alpine
    container_name: ohmkenya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ohmkenya}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-ohmkenya}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Database Admin (Adminer)
  # ==========================================
  adminer:
    image: adminer:latest
    container_name: ohmkenya-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ==========================================
  # Queue (Redis)
  # ==========================================
  redis:
    image: redis:7.4-alpine
    container_name: ohmkenya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Automated Database Backups
  # ==========================================
  # Creates automatic backups with configurable retention:
  # - Hourly backups kept for 7 days
  # - Daily backups kept for 4 weeks  
  # - Weekly backups kept for 6 months
  # ==========================================
  backup:
    image: prodrigestivill/postgres-backup-local:17-alpine
    container_name: ohmkenya-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ohmkenya}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      
      # Backup schedule (cron format)
      # Every 15 minutes - for financial data, minimize data loss risk
      # Max data loss: 15 min = ~150 transactions at 10tx/min
      SCHEDULE: "*/15 * * * *"
      
      # Retention policy (adjusted for 15-min backups)
      BACKUP_KEEP_HOURS: 672         # Keep 15-min backups for 7 days (96/day * 7)
      BACKUP_KEEP_DAYS: 28           # Keep daily backups for 4 weeks
      BACKUP_KEEP_WEEKS: 24          # Keep weekly backups for 6 months
      BACKUP_KEEP_MONTHS: 12         # Keep monthly backups for 1 year
      
      # Compression and naming
      BACKUP_SUFFIX: .sql.gz
      POSTGRES_EXTRA_OPTS: --clean --if-exists --no-owner --no-acl
      
      # Health check URL (optional - for monitoring)
      # HEALTHCHECK_URL: https://hc-ping.com/your-uuid

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
