services:
  # ==========================================
  # Admin Dashboard
  # ==========================================
  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
      args:
        # Defaults to localhost for local testing
        # Override in production to: https://api.smartmetering.africa
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: smartflowmetering-admin-dashboard
    restart: unless-stopped
    ports:
      - "80:3000"
    networks:
      - backend
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # API (Smart Flow Metering Backend)
  # ==========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartflowmetering-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Application Logic
      # NOTE: Set to 'production' in Dokploy for production deployment
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SFM_PROCESS_ROLE: api

      # Internal Network Connection
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-smartflowmetering}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}

      # External Logic (Fill these in your .env or Dokploy)
      MPESA_SHORTCODE: ${MPESA_SHORTCODE}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT}
      MPESA_BASE_URL: ${MPESA_BASE_URL}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL}
      MPESA_REGISTER_TOKEN: ${MPESA_REGISTER_TOKEN}
      MPESA_CALLBACK_TOKEN: ${MPESA_CALLBACK_TOKEN}
      MPESA_CALLBACK_TOKEN_TRANSPORT: ${MPESA_CALLBACK_TOKEN_TRANSPORT}
      MPESA_SIGNATURE_SECRET: ${MPESA_SIGNATURE_SECRET}
      MPESA_SIGNATURE_HEADER: ${MPESA_SIGNATURE_HEADER}
      MPESA_SIGNATURE_TIMESTAMP_HEADER: ${MPESA_SIGNATURE_TIMESTAMP_HEADER}
      MPESA_SIGNATURE_MAX_AGE_SECONDS: ${MPESA_SIGNATURE_MAX_AGE_SECONDS}
      MPESA_REQUIRE_SIGNATURE: ${MPESA_REQUIRE_SIGNATURE}
      MPESA_C2B_COMMAND_ID: ${MPESA_C2B_COMMAND_ID}
      MPESA_TRANSACTION_STATUS_COMMAND_ID: ${MPESA_TRANSACTION_STATUS_COMMAND_ID}
      MPESA_IDENTIFIER_TYPE: ${MPESA_IDENTIFIER_TYPE}
      MPESA_ALLOWED_IPS: ${MPESA_ALLOWED_IPS}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH}
      FCM_ENABLED: ${FCM_ENABLED}
      FCM_DRY_RUN: ${FCM_DRY_RUN}
      HOSTPINNACLE_API_URL: ${HOSTPINNACLE_API_URL}
      HOSTPINNACLE_USER_ID: ${HOSTPINNACLE_USER_ID}
      HOSTPINNACLE_PASSWORD: ${HOSTPINNACLE_PASSWORD}
      HOSTPINNACLE_API_KEY: ${HOSTPINNACLE_API_KEY}
      HOSTPINNACLE_SENDER_ID: ${HOSTPINNACLE_SENDER_ID}
      HOSTPINNACLE_DLR_WEBHOOK_TOKEN: ${HOSTPINNACLE_DLR_WEBHOOK_TOKEN}
      HOSTPINNACLE_DLR_WEBHOOK_HEADER: ${HOSTPINNACLE_DLR_WEBHOOK_HEADER}
      GOMELONG_API_URL: ${GOMELONG_API_URL}
      GOMELONG_USER_ID: ${GOMELONG_USER_ID}
      GOMELONG_PASSWORD: ${GOMELONG_PASSWORD}
      GOMELONG_VENDING_TYPE: ${GOMELONG_VENDING_TYPE}
      ALERT_AUTOMATION_ENABLED: ${ALERT_AUTOMATION_ENABLED}
      ALERT_AUTOMATION_INTERVAL_SECONDS: ${ALERT_AUTOMATION_INTERVAL_SECONDS}
      ALERT_TIMEZONE: ${ALERT_TIMEZONE}
      LOW_BALANCE_ALERT_DEDUPE_HOURS: ${LOW_BALANCE_ALERT_DEDUPE_HOURS}
      POSTPAID_REMINDER_DEDUPE_HOURS: ${POSTPAID_REMINDER_DEDUPE_HOURS}
      POSTPAID_REMINDER_DAYS_AFTER_PAYMENT: ${POSTPAID_REMINDER_DAYS_AFTER_PAYMENT}
      LANDLORD_DAILY_USAGE_SMS_ENABLED: ${LANDLORD_DAILY_USAGE_SMS_ENABLED}
      LANDLORD_DAILY_USAGE_SMS_HOUR: ${LANDLORD_DAILY_USAGE_SMS_HOUR}

      # Allow CORS from localhost and prod
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,https://smartmetering.africa,https://www.smartmetering.africa"
    networks:
      - backend
    volumes:
      - ./apps/api/smart-flow-metering-firebase-adminsdk-fbsvc-f853c036bd.json:/usr/src/app/apps/api/smart-flow-metering-firebase-adminsdk-fbsvc-f853c036bd.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartflowmetering-worker
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SFM_PROCESS_ROLE: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-smartflowmetering}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT}
      MPESA_BASE_URL: ${MPESA_BASE_URL}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL}
      MPESA_REGISTER_TOKEN: ${MPESA_REGISTER_TOKEN}
      MPESA_CALLBACK_TOKEN: ${MPESA_CALLBACK_TOKEN}
      MPESA_CALLBACK_TOKEN_TRANSPORT: ${MPESA_CALLBACK_TOKEN_TRANSPORT}
      MPESA_SIGNATURE_SECRET: ${MPESA_SIGNATURE_SECRET}
      MPESA_SIGNATURE_HEADER: ${MPESA_SIGNATURE_HEADER}
      MPESA_SIGNATURE_TIMESTAMP_HEADER: ${MPESA_SIGNATURE_TIMESTAMP_HEADER}
      MPESA_SIGNATURE_MAX_AGE_SECONDS: ${MPESA_SIGNATURE_MAX_AGE_SECONDS}
      MPESA_REQUIRE_SIGNATURE: ${MPESA_REQUIRE_SIGNATURE}
      MPESA_C2B_COMMAND_ID: ${MPESA_C2B_COMMAND_ID}
      MPESA_TRANSACTION_STATUS_COMMAND_ID: ${MPESA_TRANSACTION_STATUS_COMMAND_ID}
      MPESA_IDENTIFIER_TYPE: ${MPESA_IDENTIFIER_TYPE}
      MPESA_ALLOWED_IPS: ${MPESA_ALLOWED_IPS}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH}
      FCM_ENABLED: ${FCM_ENABLED}
      FCM_DRY_RUN: ${FCM_DRY_RUN}
      HOSTPINNACLE_API_URL: ${HOSTPINNACLE_API_URL}
      HOSTPINNACLE_USER_ID: ${HOSTPINNACLE_USER_ID}
      HOSTPINNACLE_PASSWORD: ${HOSTPINNACLE_PASSWORD}
      HOSTPINNACLE_API_KEY: ${HOSTPINNACLE_API_KEY}
      HOSTPINNACLE_SENDER_ID: ${HOSTPINNACLE_SENDER_ID}
      HOSTPINNACLE_DLR_WEBHOOK_TOKEN: ${HOSTPINNACLE_DLR_WEBHOOK_TOKEN}
      HOSTPINNACLE_DLR_WEBHOOK_HEADER: ${HOSTPINNACLE_DLR_WEBHOOK_HEADER}
      GOMELONG_API_URL: ${GOMELONG_API_URL}
      GOMELONG_USER_ID: ${GOMELONG_USER_ID}
      GOMELONG_PASSWORD: ${GOMELONG_PASSWORD}
      GOMELONG_VENDING_TYPE: ${GOMELONG_VENDING_TYPE}
      ALERT_AUTOMATION_ENABLED: ${ALERT_AUTOMATION_ENABLED}
      ALERT_AUTOMATION_INTERVAL_SECONDS: ${ALERT_AUTOMATION_INTERVAL_SECONDS}
      ALERT_TIMEZONE: ${ALERT_TIMEZONE}
      LOW_BALANCE_ALERT_DEDUPE_HOURS: ${LOW_BALANCE_ALERT_DEDUPE_HOURS}
      POSTPAID_REMINDER_DEDUPE_HOURS: ${POSTPAID_REMINDER_DEDUPE_HOURS}
      POSTPAID_REMINDER_DAYS_AFTER_PAYMENT: ${POSTPAID_REMINDER_DAYS_AFTER_PAYMENT}
      LANDLORD_DAILY_USAGE_SMS_ENABLED: ${LANDLORD_DAILY_USAGE_SMS_ENABLED}
      LANDLORD_DAILY_USAGE_SMS_HOUR: ${LANDLORD_DAILY_USAGE_SMS_HOUR}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,https://smartmetering.africa,https://www.smartmetering.africa"
    networks:
      - backend
    volumes:
      - ./apps/api/smart-flow-metering-firebase-adminsdk-fbsvc-f853c036bd.json:/usr/src/app/apps/api/smart-flow-metering-firebase-adminsdk-fbsvc-f853c036bd.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # Database (PostgreSQL 18)
  # ==========================================
  postgres:
    image: postgres:18.3-alpine3.22
    container_name: smartflowmetering-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartflowmetering}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smartflowmetering}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Database Admin (Adminer)
  # ==========================================
  adminer:
    image: adminer:5.4.2-standalone
    container_name: smartflowmetering-adminer
    restart: unless-stopped
    profiles: ["ops"]
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ==========================================
  # Queue (Redis)
  # ==========================================
  redis:
    image: redis:8.4.0-alpine3.22
    container_name: smartflowmetering-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Automated Database Backups
  # ==========================================
  # Creates automatic backups with configurable retention:
  # - Hourly backups kept for 7 days
  # - Daily backups kept for 4 weeks  
  # - Weekly backups kept for 6 months
  # ==========================================
  backup:
    image: prodrigestivill/postgres-backup-local:18
    container_name: smartflowmetering-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-smartflowmetering}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      
      # Backup schedule (cron format)
      # Every 15 minutes - for financial data, minimize data loss risk
      # Max data loss: 15 min = ~150 transactions at 10tx/min
      SCHEDULE: "*/15 * * * *"
      
      # Retention policy (adjusted for 15-min backups)
      BACKUP_KEEP_HOURS: 672         # Keep 15-min backups for 7 days (96/day * 7)
      BACKUP_KEEP_DAYS: 28           # Keep daily backups for 4 weeks
      BACKUP_KEEP_WEEKS: 24          # Keep weekly backups for 6 months
      BACKUP_KEEP_MONTHS: 12         # Keep monthly backups for 1 year
      
      # Compression and naming
      BACKUP_SUFFIX: .sql.gz
      POSTGRES_EXTRA_OPTS: --clean --if-exists --no-owner --no-acl
      
      # Health check URL (optional - for monitoring)
      # HEALTHCHECK_URL: https://hc-ping.com/your-uuid

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
